name: POLYWELL 新品監控

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_new_products.py

      - name: Commit updated product list
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_products.json
          git diff --cached --quiet || git commit -m "chore: update product list $(date +'%Y-%m-%d %H:%M UTC')"
          git push
